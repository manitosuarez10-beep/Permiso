<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador de Permisos</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#1976d2;
color:white;
border:none;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.resultado{
margin-top:20px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="container">

<h2>Generador de Permisos</h2>

<input id="numero" placeholder="Nro de solicitud">
<input id="fecha" placeholder="Fecha">
<input id="solicitante" placeholder="Solicitante">
<input id="empresa" placeholder="Empresa">

<button onclick="generar()">Generar Permiso</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

function generar(){

let numero = document.getElementById("numero").value;
let fecha = document.getElementById("fecha").value;
let solicitante = document.getElementById("solicitante").value;
let empresa = document.getElementById("empresa").value;

let link = "https://municipalidadsmt.github.io/Permiso" +
"?numero=" + numero +
"&fecha=" + fecha +
"&solicitante=" + solicitante +
"&empresa=" + empresa;

document.getElementById("resultado").innerHTML =
"<b>Link del permiso:</b><br><a href='"+link+"' target='_blank'>"+link+"</a>";

}

</script>

</body>
</html>
